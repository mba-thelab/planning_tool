<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The/Lab — Sign in</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#1a1a18;color:#d3d1c7;min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:#2c2c2a;border:1px solid #3d3d3a;border-radius:14px;padding:48px 44px;width:100%;max-width:380px;text-align:center}
  .logo{font-size:13px;font-weight:700;letter-spacing:3px;color:#f1efe8;margin-bottom:36px}
  h1{font-size:22px;font-weight:600;color:#f1efe8;margin-bottom:8px}
  p{font-size:13px;color:#888780;margin-bottom:32px;line-height:1.6}
  .btn-google{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px 20px;background:#f1efe8;color:#1a1a18;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .15s}
  .btn-google:hover{background:#d3d1c7}
  .btn-google svg{width:18px;height:18px;flex-shrink:0}
  .error{background:#3a1515;border:1px solid #6b2020;border-radius:8px;padding:10px 14px;font-size:12px;color:#f09595;margin-bottom:20px;display:none}
  .divider{border:none;border-top:1px solid #3d3d3a;margin:28px 0}
  .note{font-size:11px;color:#5f5e5a;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">THE/LAB</div>
  <h1>Welcome back</h1>
  <p>Sign in with your The/Lab Google account to continue.</p>

  <div class="error" id="err">Only <strong>@thelab.dk</strong> accounts are allowed.</div>

  <a class="btn-google" href="/auth/google">
    <svg viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Sign in with Google
  </a>

  <hr class="divider">
  <div class="note">Access is restricted to @thelab.dk accounts.<br>Contact your admin if you need access.</div>
</div>

<script>
  if (new URLSearchParams(location.search).get('error')) {
    document.getElementById('err').style.display = 'block';
  }
</script>
</body>
</html>
