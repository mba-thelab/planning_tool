<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The/Lab — Welcome</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <a class="logo" href="/">THE/LAB</a>
  <div class="tr-right">
    <button class="btn ghost" onclick="App.logout()">Sign out</button>
  </div>
</div>

<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - 52px);padding:20px">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:40px;width:100%;max-width:420px">
    <h2 style="font-size:18px;font-weight:600;color:var(--hi);margin-bottom:6px">Welcome to The/Lab</h2>
    <p style="font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6">Let's set up your profile. Your role will be assigned by an admin.</p>

    <div style="margin-bottom:16px">
      <label style="display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px">Your name</label>
      <input id="ob-name" class="rc-in" style="width:100%;box-sizing:border-box" placeholder="Full name...">
    </div>

    <div style="margin-bottom:16px">
      <label style="display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px">Department</label>
      <select id="ob-dept" class="sb-in" style="width:100%" onchange="onDeptChange()">
        <option value="">— Select department —</option>
      </select>
    </div>

    <div style="margin-bottom:28px">
      <label style="display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:6px">Sub-department</label>
      <select id="ob-subdept" class="sb-in" style="width:100%">
        <option value="">— None —</option>
      </select>
    </div>

    <button class="btn primary" style="width:100%;padding:12px" onclick="submitOnboard()">Continue →</button>
    <div id="ob-error" style="display:none;margin-top:12px;font-size:12px;color:#f09595;text-align:center"></div>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
// Populate from Google name + departments from global settings
document.addEventListener('DOMContentLoaded', async () => {
  const user = await App.fetchCurrentUser();
  // If user already has a profile, go to dashboard
  if (user && user.employeeId) {
    window.location.href = '/';
    return;
  }
  // Pre-fill name from Google
  if (user) document.getElementById('ob-name').value = user.name || '';
  // Populate dept dropdown
  const global = App.getGlobal();
  const depts = global.departments || [];
  const deptSel = document.getElementById('ob-dept');
  depts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id; opt.textContent = d.name;
    deptSel.appendChild(opt);
  });
});

function onDeptChange() {
  const deptId = document.getElementById('ob-dept').value;
  const global = App.getGlobal();
  const dept = (global.departments || []).find(d => d.id === deptId);
  const subDepts = dept ? (dept.subDepts || []) : [];
  const sel = document.getElementById('ob-subdept');
  sel.innerHTML = '<option value="">— None —</option>' +
    subDepts.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
}

function submitOnboard() {
  const name     = document.getElementById('ob-name').value.trim();
  const deptId   = document.getElementById('ob-dept').value    || null;
  const subDeptId= document.getElementById('ob-subdept').value || null;
  const errEl    = document.getElementById('ob-error');

  if (!name) {
    errEl.textContent = 'Please enter your name.';
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const user = App.currentUser;
  if (!user) return;

  // Save employee to global settings
  const global = App.getGlobal();
  if (!global.employees) global.employees = [];

  const emp = {
    id: uid(),
    name,
    email:      user.email,
    deptId,
    subDeptId,
    role:       'employee', // always starts as employee; admin promotes
  };
  global.employees.push(emp);
  App.saveGlobal(global);

  // Update session
  App.saveSession({ employeeId: emp.id, viewMode: 'employee' });

  window.location.href = '/';
}
</script>
</body>
</html>
