<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The/Lab — Job</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <a class="logo" href="/">THE/LAB</a>
  <div class="sep"></div>
  <input class="job-title-in" id="job-title" placeholder="Job title..." oninput="onTitleInput()">
  <div class="sep"></div>
  <select class="status-sel" id="job-status" onchange="onStatusChange()">
    <option value="inquiry">Inquiry</option>
    <option value="active">Active</option>
    <option value="in-production">In Production</option>
    <option value="delivered">Delivered</option>
    <option value="invoiced">Invoiced</option>
  </select>
  <div class="tr-right">
    <span class="dirty" id="dirty-ind" style="display:none">● Unsaved</span>
    <button class="btn ghost" id="q-view-toggle-btn" onclick="toggleQuoteView()" style="display:none;font-size:11px">Client view</button>
    <button class="btn ghost" onclick="exportQuotePDF()" id="export-btn" style="display:none">Export PDF</button>
    <button class="btn ghost" onclick="saveJob()">Save</button>
    <a href="/settings.html" class="btn ghost" style="text-decoration:none">⚙</a>
  </div>
</div>

<nav class="sys-nav">
  <a href="/" class="sys-nav-item">DASHBOARD</a>
  <span class="sys-nav-sep">/</span>
  <a href="/board.html" class="sys-nav-item">BOARD</a>
  <span class="sys-nav-sep">/</span>
  <span class="sys-nav-item active" id="breadcrumb">New job</span>
</nav>

<div class="job-page">
  <div class="job-tab-bar">
    <button class="job-tab active" data-tab="plan" onclick="switchTab('plan')">Plan</button>
    <button class="job-tab" data-tab="quote" onclick="switchTab('quote')">Quote</button>
    <button class="job-tab" data-tab="schedule" onclick="switchTab('schedule')">Schedule</button>
  </div>

  <div class="job-body">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar"></div>

    <!-- PLAN TAB -->
    <div class="job-content job-tab-panel" id="tab-plan"></div>

    <!-- QUOTE TAB -->
    <div class="job-content job-tab-panel" id="tab-quote" style="display:none"></div>

    <!-- SCHEDULE TAB -->
    <div class="job-content job-tab-panel" id="tab-schedule" style="display:none"></div>
  </div>
</div>

<!-- SCHEDULE ENTRY MODAL -->
<div class="modal-bg" id="sched-modal">
  <div class="modal" style="min-width:500px">
    <h3 id="sched-modal-title">Add to Operations Board</h3>

    <div class="modal-group">
      <label class="modal-lbl">Phase</label>
      <select id="sm-phase" class="modal-in"></select>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Studio / Location</label>
      <div style="display:flex;gap:8px">
        <select id="sm-loc" class="modal-in" style="flex:1" onchange="onSmLocChange()">
          <option value="">— Select —</option>
          <option value="studio">Studio</option>
          <option value="floor4">4th floor</option>
          <option value="forhallen">Forhallen</option>
          <option value="equipment">Equipment room</option>
          <option value="onlocation">On location</option>
          <option value="other">Other</option>
        </select>
        <select id="sm-studio-num" class="modal-in" style="width:120px;display:none">
          <option value="">Studio #</option>
          <option>1</option><option>2</option><option>3</option><option>4</option>
          <option>5</option><option>6</option><option>7</option><option>8</option>
        </select>
        <input id="sm-loc-addr" class="modal-in" style="flex:1;display:none" placeholder="Address or details...">
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Dates</label>
      <div style="display:flex;gap:8px">
        <input type="date" id="sm-date-start" class="modal-in" style="flex:1">
        <input type="date" id="sm-date-end" class="modal-in" style="flex:1">
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl" style="margin-bottom:8px">Job type</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="sm-type-chips">
        <button type="button" class="type-chip" data-type="build" onclick="this.classList.toggle('active')">Build</button>
        <button type="button" class="type-chip" data-type="paint" onclick="this.classList.toggle('active')">Paint</button>
        <button type="button" class="type-chip" data-type="strike" onclick="this.classList.toggle('active')">Strike</button>
        <button type="button" class="type-chip" data-type="install" onclick="this.classList.toggle('active')">Install</button>
        <button type="button" class="type-chip" data-type="touch-up" onclick="this.classList.toggle('active')">Touch-up</button>
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Note</label>
      <input type="text" id="sm-note" class="modal-in" placeholder="Any notes...">
    </div>

    <div class="modal-btns">
      <button class="btn danger" id="sm-delete-btn" onclick="deleteSchedEntry()" style="display:none">Remove</button>
      <button class="btn" onclick="closeModal('sched-modal')">Cancel</button>
      <button class="btn primary" onclick="confirmSchedEntry()">Save</button>
    </div>
  </div>
</div>

<!-- COLOR PICKER (for plan phases) -->
<div class="modal-bg" id="color-modal">
  <div class="modal" style="min-width:300px">
    <h3>Phase colour</h3>
    <div style="display:flex;flex-wrap:wrap;gap:8px;padding:8px 0" id="color-swatches"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('color-modal')">Cancel</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/job.js"></script>
</body>
</html>
