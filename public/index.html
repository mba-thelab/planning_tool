<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The/Lab — Dashboard</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <a class="logo" href="/">THE/LAB</a>
  <div class="sep"></div>
  <span style="font-size:11px;color:var(--text2)" id="dash-date"></span>
  <div class="tr-right">
    <button class="btn" onclick="newJob()">+ New job</button>
    <a href="/settings.html" class="btn ghost" style="text-decoration:none">⚙</a>
  </div>
</div>

<nav class="sys-nav">
  <a href="/" class="sys-nav-item active">DASHBOARD</a>
  <span class="sys-nav-sep">/</span>
  <a href="/board.html" class="sys-nav-item">BOARD</a>
</nav>

<div style="padding:20px 24px;overflow-y:auto;height:calc(100vh - 86px)">
  <div style="margin-bottom:20px;display:flex;align-items:flex-end;justify-content:space-between">
    <div>
      <div class="dash-greeting" id="greeting">GOOD MORNING</div>
      <div class="dash-sub" id="greeting-sub"></div>
    </div>
    <div>
      <input class="sb-in" id="search-in" placeholder="Search jobs..." oninput="renderPipeline()"
        style="width:200px;font-size:12px">
    </div>
  </div>

  <div class="dash-pipeline" id="pipeline"></div>
</div>

<script src="/js/app.js"></script>
<script>
'use strict';

const PIPE_STATUSES = [
  { key:'inquiry',        label:'Inquiry' },
  { key:'active',         label:'Active' },
  { key:'in-production',  label:'In Production' },
  { key:'delivered',      label:'Delivered' },
  { key:'invoiced',       label:'Invoiced' },
];

function newJob() { window.location.href = '/job.html'; }

function openJob(id) { window.location.href = '/job.html?id=' + id; }

function newJobWithStatus(status) {
  const job = Jobs.blank();
  job.status = status;
  Jobs.save(job);
  window.location.href = '/job.html?id=' + job.id;
}

function deleteJob(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this job? This cannot be undone.')) return;
  Jobs.delete(id);
  renderPipeline();
}

function renderPipeline() {
  const q       = (document.getElementById('search-in')?.value || '').toLowerCase().trim();
  const all     = Jobs.getAll();
  const matches = q
    ? all.filter(j => (j.title||'').toLowerCase().includes(q) || (j.client?.name||'').toLowerCase().includes(q))
    : all;

  document.getElementById('pipeline').innerHTML = PIPE_STATUSES.map(st => {
    const jobs  = matches.filter(j => j.status === st.key);
    const cards = jobs.map(j => {
      const depts = (j.departments||[]).slice(0,3).join(', ');
      const dates = (j.dateStart || j.dateEnd) ? fmtDateRange(j.dateStart, j.dateEnd) : '';
      return `<div class="pipe-job" onclick="openJob('${j.id}')">
        ${j.client?.name ? `<div class="pipe-job-client">${esc(j.client.name)}</div>` : ''}
        <div class="pipe-job-title">${esc(j.title || 'Untitled job')}</div>
        <div class="pipe-job-meta">
          ${dates ? `<span>${dates}</span>` : ''}
          ${depts ? `<span>${esc(depts)}</span>` : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="pipe-col">
      <div class="pipe-col-hdr">
        <span>${st.label}</span>
        ${jobs.length ? `<span class="pipe-count">${jobs.length}</span>` : ''}
      </div>
      ${cards}
      <button class="pipe-new-btn" onclick="newJobWithStatus('${st.key}')">+ New</button>
    </div>`;
  }).join('');
}

function initGreeting() {
  const now  = new Date();
  const h    = now.getHours();
  const word = h < 12 ? 'MORNING' : h < 17 ? 'AFTERNOON' : 'EVENING';
  document.getElementById('greeting').textContent = 'GOOD ' + word;
  document.getElementById('dash-date').textContent =
    now.toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' });
  const active = Jobs.getAll().filter(j => j.status === 'active' || j.status === 'in-production');
  document.getElementById('greeting-sub').textContent = active.length
    ? active.length + ' job' + (active.length > 1 ? 's' : '') + ' active.'
    : 'No active jobs.';
}

window.onUserReady = function() {
  const u = App.currentUser;
  if (u?.name) {
    const name = u.name.split(' ')[0].toUpperCase();
    const h    = new Date().getHours();
    const word = h < 12 ? 'MORNING' : h < 17 ? 'AFTERNOON' : 'EVENING';
    document.getElementById('greeting').textContent = 'GOOD ' + word + ', ' + name;
  }
};

initGreeting();
renderPipeline();
</script>
</body>
</html>
