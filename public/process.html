<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The/Lab — Process</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="topbar">
  <a class="logo" href="/">THE/LAB</a>
  <div class="sep"></div>
  <span class="proj-context" id="proj-context" onclick="document.getElementById('proj-name').focus()">—</span>
  <div class="tr-right">
    <span class="dirty" id="dirty-ind" style="display:none">● Unsaved</span>
    <button class="btn ghost" id="seed-btn" style="display:none;font-size:11px;color:var(--accent)" onclick="seedTestData()" title="Fill with sample data (test mode only)">⚗ Seed data</button>
    <button class="btn ghost" id="clear-btn" style="display:none;font-size:11px;color:#f09595" onclick="if(confirm('Clear all test data?'))App.clearTestData()" title="Remove all test data (test mode only)">✕ Clear all</button>
    <div style="position:relative">
      <button class="btn" onclick="toggleExportMenu()">Export ▾</button>
      <div id="exp-menu" style="display:none;position:absolute;right:0;top:110%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:4px;z-index:100;min-width:220px">
        <div id="exp-items"></div>
      </div>
    </div>
    <button class="btn ghost" onclick="saveProject()">Save</button>
    <a href="/settings.html" class="btn ghost" style="text-decoration:none">⚙</a>
  </div>
</div>

<nav class="sys-nav">
  <a href="/" class="sys-nav-item" id="snav-dash">DASHBOARD</a>
  <span class="sys-nav-sep">/</span>
  <a href="/process.html" class="sys-nav-item active" id="snav-process">PROCESS</a>
  <span class="sys-nav-sep">/</span>
  <a href="/estimate.html" class="sys-nav-item" id="snav-estimate">ESTIMATE</a>
  <span class="sys-nav-sep">/</span>
  <a href="/jobs.html" class="sys-nav-item" id="snav-jobs">JOB BOARD</a>
</nav>

<div class="app">
  <div class="sidebar">
    <div>
      <div class="sb-lbl">Project</div>
      <input class="sb-in" id="proj-name" placeholder="Project name..." oninput="dirty();updateProjContext()" style="margin-bottom:5px">
      <input class="sb-in" id="proj-client" placeholder="Client..." oninput="dirty()" style="margin-bottom:5px">
      <div class="sb-row">
        <select class="sb-in" id="sel-ver" onchange="dirty()">
          <option>V1</option><option>V2</option><option>V3</option><option>V4</option><option>V5</option>
        </select>
        <input class="sb-in" id="proj-date" type="date" oninput="dirty()">
      </div>
    </div>

    <div>
      <div class="sb-lbl">Allocation options</div>
      <div class="assign-wrap" id="assign-wrap"></div>
      <div class="assign-add-row">
        <input id="assign-new" placeholder="New option..." onkeydown="if(event.key==='Enter')addAssignOpt()">
        <button onclick="addAssignOpt()">+ Add</button>
      </div>
    </div>

    <div>
      <div class="sb-lbl">Saved Projects</div>
      <div class="saved-list" id="saved-list"></div>
      <button class="btn" style="font-size:11px;margin-top:6px;width:100%" onclick="newProject()">+ New project</button>
    </div>
  </div>

  <div class="main" id="main"></div>
</div>

<!-- PUSH TO ESTIMATE MODAL -->
<div class="modal-bg" id="push-modal">
  <div class="modal">
    <h3>Push to Estimate</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Choose which category to push this task to:</p>
    <div id="push-opts"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal('push-modal')">Cancel</button>
      <button class="btn primary" onclick="confirmPush()">Push</button>
    </div>
  </div>
</div>

<!-- ADD TO JOB BOARD MODAL -->
<div class="modal-bg" id="jb-modal">
  <div class="modal" style="min-width:480px;max-width:580px;max-height:90vh;overflow-y:auto">
    <h3>Add to Job Board — <span id="jb-task-name" style="color:var(--text2);font-weight:400"></span></h3>

    <div class="modal-group">
      <label class="modal-lbl">Ready by</label>
      <div style="display:flex;gap:8px">
        <input type="date" id="jb-ready-by" class="modal-in" style="flex:1">
        <input type="time" id="jb-ready-time" class="modal-in" style="width:110px" title="Ready by time">
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Strike</label>
      <div style="display:flex;gap:8px">
        <input type="date" id="jb-strike-date" class="modal-in" style="flex:1">
        <input type="time" id="jb-strike-time" class="modal-in" style="width:110px" title="Strike time">
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Location</label>
      <div style="display:flex;gap:8px">
        <select id="jb-loc-type" class="modal-in" style="flex:1" onchange="onJbLocChange()">
          <option value="">— Select —</option>
          <option value="studio">Studio</option>
          <option value="floor4">4th floor</option>
          <option value="forhallen">Forhallen</option>
          <option value="equipment">Equipment room</option>
          <option value="onlocation">On location</option>
          <option value="other">Other</option>
        </select>
        <select id="jb-studio-num" class="modal-in" style="width:120px;display:none">
          <option value="">Studio #</option>
          <option value="1">Studio 1</option>
          <option value="2">Studio 2</option>
          <option value="3">Studio 3</option>
          <option value="4">Studio 4</option>
          <option value="5">Studio 5</option>
          <option value="6">Studio 6</option>
          <option value="7">Studio 7</option>
          <option value="8">Studio 8</option>
        </select>
        <input id="jb-loc-addr" class="modal-in" style="flex:1;display:none" placeholder="Address...">
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl" style="margin-bottom:8px">Job type</label>
      <div style="display:flex;gap:6px;flex-wrap:wrap" id="jb-type-chips">
        <button type="button" class="type-chip" data-type="build"    onclick="this.classList.toggle('active')">Build</button>
        <button type="button" class="type-chip" data-type="paint"    onclick="this.classList.toggle('active')">Paint</button>
        <button type="button" class="type-chip" data-type="strike"   onclick="this.classList.toggle('active')">Strike</button>
        <button type="button" class="type-chip" data-type="install"  onclick="this.classList.toggle('active')">Install</button>
        <button type="button" class="type-chip" data-type="touch-up" onclick="this.classList.toggle('active')">Touch-up</button>
      </div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl">Contact / Booker</label>
      <input type="text" id="jb-contact" class="modal-in" placeholder="Ronnie, Matias...">
    </div>

    <div class="modal-group">
      <label class="modal-lbl" style="margin-bottom:8px">Production stages</label>
      <div id="jb-stages-list"></div>
    </div>

    <div class="modal-group">
      <label class="modal-lbl" style="margin-bottom:8px">Assigned crew</label>
      <div id="jb-crew-section"></div>
    </div>

    <div class="modal-btns">
      <button class="btn danger" onclick="removeFromJobBoard(pendingJobTask&&pendingJobTask.tid)">Remove from board</button>
      <button class="btn" onclick="closeModal('jb-modal')">Cancel</button>
      <button class="btn primary" onclick="confirmJobBoard()">Save to Job Board</button>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/process.js"></script>
</body>
</html>
